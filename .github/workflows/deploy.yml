name: Deploy to GitHub Pages

# master への push でビルドし、GitHub Pages に公開する。
on:
  push:
    branches: [master]
  workflow_dispatch: # 手動実行も可能にする

# 既定は読み取りのみ。書き込み権限は必要な deploy ジョブにだけ個別付与する（最小権限）。
permissions:
  contents: read

# 同時実行を1つに制限（古いデプロイが新しいものを上書きしないように）。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # Pages への公開
      id-token: write # OIDC トークン発行
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

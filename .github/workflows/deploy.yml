name: Deploy to GitHub Pages

# master への push でビルドし、GitHub Pages に公開する。
on:
  push:
    branches: [master]
  workflow_dispatch: # 手動実行も可能にする

# Pages へのデプロイに必要な権限（OIDC トークンで安全に公開する）。
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに制限（古いデプロイが新しいものを上書きしないように）。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

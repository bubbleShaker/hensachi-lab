<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: DuckDB-WASM のエンジン(wasm/worker)は jsDelivr から取得し、Worker は blob URL で起動する。
      それらを許可しつつ他オリジンを遮断する。WebAssembly 実行に wasm-unsafe-eval が必要。
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net blob:; worker-src 'self' blob:; connect-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <title>偏差値ラボ 🥜 hensachi-lab</title>
  </head>
  <body>
    <main class="app">
      <header>
        <h1>偏差値ラボ</h1>
        <p class="lead">
          世の中の正規分布データから、あなたの値の <b>偏差値・パーセンタイル</b> を
          ブラウザ内の DuckDB で計算するのだ。
        </p>
      </header>

      <section class="card">
        <div class="controls">
          <label>
            カテゴリ
            <select id="category"></select>
          </label>
          <label>
            あなたの値
            <input id="value" type="number" step="0.1" placeholder="例: 175" />
            <span id="unit" class="unit"></span>
          </label>
          <button id="calc" disabled>計算する</button>
        </div>
        <p id="status" class="status">DuckDB を起動中なのだ…</p>
      </section>

      <section id="results" class="card hidden">
        <div class="metrics">
          <div class="metric hero">
            <div class="metric-label">偏差値</div>
            <div class="metric-value" id="m-hensachi">–</div>
          </div>
          <div class="metric">
            <div class="metric-label">z スコア</div>
            <div class="metric-value" id="m-z">–</div>
          </div>
          <div class="metric">
            <div class="metric-label">上位</div>
            <div class="metric-value" id="m-top">–</div>
          </div>
          <div class="metric">
            <div class="metric-label">100人ならあなたは</div>
            <div class="metric-value" id="m-rank">–</div>
          </div>
        </div>
        <p id="interpret" class="interpret"></p>
        <div class="chart-wrap">
          <canvas id="chart"></canvas>
        </div>
        <p id="meta" class="meta"></p>
      </section>

      <footer>
        <p class="disclaimer" id="disclaimer"></p>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
